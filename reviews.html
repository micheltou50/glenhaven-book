<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Reviews — Glenhaven</title>
  <link rel="stylesheet" href="style.css"/>
  <style>
    .page-hero{background:var(--g100);padding:4rem 0 2rem;border-bottom:1px solid var(--g200)}
    .rating-summary{display:none;align-items:center;gap:3rem;margin:2.5rem 0;flex-wrap:wrap}
    .big-rating{text-align:center}
    .big-rating .num{font-size:4rem;font-weight:800;letter-spacing:-.04em;line-height:1}
    .big-rating .stars{font-size:1.3rem;color:var(--green);margin:.25rem 0}
    .big-rating p{font-size:.82rem;color:var(--g500)}
    .reviews-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(340px,1fr));gap:1.25rem}
    .rv-card{background:#fff;border:1px solid var(--g200);border-radius:var(--r-xl);padding:1.5rem;transition:box-shadow var(--tr)}
    .rv-card:hover{box-shadow:var(--sh-lg)}
    .rv-top{display:flex;align-items:center;gap:.85rem;margin-bottom:1rem}
    .rv-av{width:44px;height:44px;border-radius:50%;background:var(--green);color:#fff;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:.85rem;flex-shrink:0}
    .rv-name{font-weight:700;font-size:.9rem}
    .rv-date{font-size:.78rem;color:var(--g400);margin-top:.1rem}
    .rv-stars{margin-left:auto;color:var(--green);font-size:.9rem}
    .rv-text{font-size:.88rem;line-height:1.65;color:var(--g600)}
    .rv-platform{margin-top:.75rem;font-size:.75rem;color:var(--g400);display:flex;align-items:center;gap:.3rem}
  </style>
</head>
<body>
<header><nav class="navbar"><div class="container nav-inner">
  <a href="index.html" class="nav-logo">Glen<em>haven</em></a>
  <ul class="nav-links" id="navLinks">
    <li><a href="gallery.html">Gallery</a></li>
    <li><a href="amenities.html">Amenities</a></li>
    <li><a href="location.html">Location</a></li>
    <li><a href="reviews.html" class="active">Reviews</a></li>
    <li><a href="booking.html" class="nav-cta">Book Now</a></li>
  </ul>
  <button class="nav-burger" id="navBurger" aria-label="Open menu">☰</button>
</div></nav></header>

<div class="page-hero">
  <div class="container">
    <span class="eyebrow">Guest Reviews</span>
    <h1>What guests say</h1>
  </div>
</div>

<section class="section">
  <div class="container">
    <div class="rating-summary" id="ratingSummary">
      <div class="big-rating">
        <div class="num" id="avgRating">—</div>
        <div class="stars" id="avgStars">☆☆☆☆☆</div>
        <p id="reviewCount">Loading...</p>
      </div>
    </div>

    <div class="reviews-grid" id="reviewsGrid">
      <p style="text-align:center;color:var(--g400);padding:2rem;grid-column:1/-1;">Loading reviews...</p>
    </div>

    <div class="text-center" style="margin-top:3rem;">
      <a href="booking.html" class="btn btn-primary btn-lg">Book Your Stay</a>
    </div>
  </div>
</section>

<footer class="footer"><div class="container"><div class="footer-bot">
  <p>© 2025 Glenhaven · Katoomba, NSW, Australia</p>
  <div class="footer-links"><a href="index.html">Home</a><a href="booking.html">Book</a></div>
</div></div></footer>
<script type="module" src="js/pages/reviews.js"></script>
</body></html>
